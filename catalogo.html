<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Testes</title>
</head>

<body>

<header>
<nav>
  ./Início</a>
  <a href="catalogo.html">Testes</a>
  <a href="pagina.html?slug=utentes">Informações</a>
  <a href="pagina.html?slug=contactos">Contactos</a>
</nav>
</header>

<main>

<h1>Catálogo de Testes</h1>

<!-- CONTROLOS -->
<div>

<input type="text" id="searchInput" placeholder="Pesquisar teste...">

<select id="areaFilter">
  <option value="">Todas as áreas</option>
</select>

<a href="catalogo.html">Limpar filtros</a>

</div>

<!-- RESULTADOS -->
<div id="resultsContainer">
  A carregar testes...
</div>

</main>

<script>
const TESTS_JSON_URL = "data/index.json";

let allTests = [];

// carregar dados
async function loadTests() {
  try {
    const response = await fetch(TESTS_JSON_URL, { cache: "no-store" });

    if (!response.ok) {
      throw new Error("Não foi possível carregar /data/index.json");
    }

    const data = await response.json();

    allTests = data;
    populateAreaFilter(data);
    renderTests(data);

  } catch (err) {
    console.error(err);
    document.getElementById("resultsContainer").innerText =
      "Não foi possível carregar o catálogo (verifique /data/index.json)";
  }
}

// preencher filtro de área
function populateAreaFilter(tests) {
  const select = document.getElementById("areaFilter");

  const areas = [...new Set(tests.map(t => t.area))].sort();

  areas.forEach(area => {
    const opt = document.createElement("option");
    opt.value = area;
    opt.textContent = area;
    select.appendChild(opt);
  });
}

// render testes
function renderTests(tests) {
  const container = document.getElementById("resultsContainer");
  container.innerHTML = "";

  if (!tests.length) {
    container.innerHTML = "Sem resultados";
    return;
  }

  tests.forEach(test => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>
        <a href="teste.html?slug=${encodeURIComponent(test.slug)}">
          ${test.title}
        </a>
      </p>
      <p>${test.area}</p>
    `;

    container.appendChild(div);
  });
}

// aplicar filtros
function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const area = document.getElementById("areaFilter").value;

  let filtered = allTests;

  if (search) {
    filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(search)
    );
  }

  if (area) {
    filtered = filtered.filter(t =>
      t.area === area
    );
  }

  renderTests(filtered);
}

// eventos
document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("areaFilter").addEventListener("change", applyFilters);

// iniciar
loadTests();
</script>

</body>
</html>
