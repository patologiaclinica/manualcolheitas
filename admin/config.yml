backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

site_url: "https://acessoeditores.netlify.app"
display_url: "https://acessoeditores.netlify.app"

publish_mode: editorial_workflow

collections:
  - name: "testes"
    label: "Testes"
    label_singular: "Teste"
    folder: "content/testes"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - label: "Nome do teste"
        name: "title"
        widget: "string"

      - label: "Área"
        name: "area"
        widget: "select"
        options:
          - "Hematologia"
          - "Imunologia / Autoimunidade"
          - "Microbiologia"
          - "Química Clínica"
          - "Citometria de Fluxo"
          - "Farmacocinética Avançada"

      - label: "Método"
        name: "metodo"
        widget: "string"

      - label: "Amostra"
        name: "amostra"
        widget: "string"

      - label: "Material de Colheita"
        name: "material_colheita"
        widget: "string"

      - label: "Descrição clínica"
        name: "descricao_clinica"
        widget: "text"

      - label: "Transporte/Estabilidade"
        name: "transporte_estabilidade"
        widget: "text"

      - label: "Tempo de resposta"
        name: "tempo_resposta"
        widget: "string"

      - label: "Setor"
        name: "setor"
        widget: "string"

      - label: "Observações importantes"
        name: "observacoes"
        widget: "text"

  - name: "paginas"
    label: "Páginas"
    label_singular: "paginas"
    folder: "content/paginas"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    files:
      - file: "content/paginas/inicio.md"
        label: "Página inicial"
        name: "inicio"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descrição curta", name: "description", widget: "text", required: false }
          - { label: "Conteúdo", name: "body", widget: "markdown" }

      - file: "content/paginas/sobre.md"
        label: "Sobre o serviço"
        name: "sobre"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descrição curta", name: "description", widget: "text", required: false }
          - { label: "Conteúdo", name: "body", widget: "markdown" }

      - file: "content/paginas/utentes.md"
        label: "Informações a utentes"
        name: "utentes"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descrição curta", name: "description", widget: "text", required: false }
          - { label: "Conteúdo", name: "body", widget: "markdown" }

      - file: "content/paginas/contactos.md"
        label: "Contactos"
        name: "contactos"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descrição curta", name: "description", widget: "text", required: false }
          - { label: "Conteúdo", name: "body", widget: "markdown" }
