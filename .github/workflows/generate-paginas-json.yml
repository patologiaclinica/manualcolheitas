name: Generate paginas.json

on:
  push:
    paths:
      - "content/paginas/**"
      - "!content/paginas/paginas.json"
      
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate paginas.json
        run: node scripts/generate-paginas.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/paginas.json
          git commit -m "update paginas.json"
          git push
